<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRAG Scrollytelling Compression Test Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .frame-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    .frame {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .grain {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .grain.active {
      opacity: 1;
    }
    
    .grain::before {
      content: "";
      position: absolute;
      top: -10rem;
      left: -10rem;
      width: calc(100% + 20rem);
      height: calc(100% + 20rem);
      background-image: url('https://upload.wikimedia.org/wikipedia/commons/5/5c/Image_gaussian_noise_example.png');
      opacity: 0.15;
      pointer-events: none;
      animation: noise 1s steps(2) infinite;
    }
    
    @keyframes noise {
      0% { transform: translate3d(0, 9rem, 0); }
      10% { transform: translate3d(-1rem, -4rem, 0); }
      20% { transform: translate3d(-8rem, 2rem, 0); }
      30% { transform: translate3d(9rem, -9rem, 0); }
      40% { transform: translate3d(-2rem, 7rem, 0); }
      50% { transform: translate3d(-9rem, -4rem, 0); }
      60% { transform: translate3d(2rem, 6rem, 0); }
      70% { transform: translate3d(7rem, -8rem, 0); }
      80% { transform: translate3d(-9rem, 1rem, 0); }
      90% { transform: translate3d(6rem, -5rem, 0); }
      to { transform: translate3d(-7rem, 0, 0); }
    }
    
    .controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.9);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #333;
      font-family: monospace;
      font-size: 14px;
      z-index: 10;
      max-width: 500px;
    }
    
    .controls h2 {
      margin-bottom: 15px;
      font-size: 16px;
      color: #00ff00;
    }
    
    .control-group {
      margin-bottom: 15px;
    }
    
    .control-group label {
      display: block;
      margin-bottom: 5px;
      color: #aaa;
      font-size: 12px;
      text-transform: uppercase;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    button {
      background: #222;
      color: #fff;
      border: 1px solid #444;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #333;
      border-color: #666;
    }
    
    button.active {
      background: #00ff00;
      color: #000;
      border-color: #00ff00;
      font-weight: bold;
    }
    
    .info {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      padding: 15px 20px;
      border-radius: 8px;
      border: 1px solid #333;
      font-family: monospace;
      font-size: 14px;
      z-index: 10;
      min-width: 250px;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 20px;
    }
    
    .info-label {
      color: #888;
    }
    
    .info-value {
      color: #00ff00;
      font-weight: bold;
    }
    
    .toggle-btn {
      width: 100%;
      margin-top: 10px;
    }
    
    .keyboard-hints {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.9);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
      font-family: monospace;
      font-size: 12px;
      z-index: 10;
      color: #666;
    }
    
    .keyboard-hints kbd {
      background: #222;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #444;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="frame-container">
      <img id="testFrame" class="frame" src="./test-compression-output/frame-0001-q78.webp" alt="Test frame">
      <div id="grainOverlay" class="grain active"></div>
    </div>
  </div>

  <div class="keyboard-hints">
    <div><kbd>←</kbd> / <kbd>→</kbd> Quality</div>
    <div><kbd>↑</kbd> / <kbd>↓</kbd> Frame</div>
    <div><kbd>Space</kbd> Toggle grain</div>
    <div><kbd>W</kbd> WebP / <kbd>A</kbd> AVIF</div>
  </div>

  <div class="info">
    <div class="info-row">
      <span class="info-label">Frame:</span>
      <span class="info-value" id="infoFrame">0001</span>
    </div>
    <div class="info-row">
      <span class="info-label">Format:</span>
      <span class="info-value" id="infoFormat">WebP</span>
    </div>
    <div class="info-row">
      <span class="info-label">Quality:</span>
      <span class="info-value" id="infoQuality">78</span>
    </div>
    <div class="info-row">
      <span class="info-label">Grain:</span>
      <span class="info-value" id="infoGrain">ON</span>
    </div>
  </div>

  <div class="controls">
    <h2>🎬 Compression Test Viewer</h2>
    
    <div class="control-group">
      <label>Frame Selection</label>
      <div class="button-group">
        <button onclick="changeFrame('0001')" class="frame-btn active" data-frame="0001">Frame 1</button>
        <button onclick="changeFrame('0500')" class="frame-btn" data-frame="0500">Frame 500</button>
        <button onclick="changeFrame('1000')" class="frame-btn" data-frame="1000">Frame 1000</button>
        <button onclick="changeFrame('1500')" class="frame-btn" data-frame="1500">Frame 1500</button>
        <button onclick="changeFrame('1746')" class="frame-btn" data-frame="1746">Frame 1746</button>
      </div>
    </div>
    
    <div class="control-group">
      <label>Quality Level</label>
      <div class="button-group">
        <button onclick="changeQuality(75)" class="quality-btn" data-quality="75">q75</button>
        <button onclick="changeQuality(78)" class="quality-btn active" data-quality="78">q78</button>
        <button onclick="changeQuality(82)" class="quality-btn" data-quality="82">q82</button>
        <button onclick="changeQuality(85)" class="quality-btn" data-quality="85">q85</button>
        <button onclick="changeQuality(90)" class="quality-btn" data-quality="90">q90</button>
      </div>
    </div>
    
    <div class="control-group">
      <label>Format</label>
      <div class="button-group">
        <button onclick="changeFormat('webp')" class="format-btn active" data-format="webp">WebP</button>
        <button onclick="changeFormat('avif')" class="format-btn" data-format="avif">AVIF</button>
      </div>
    </div>
    
    <button onclick="toggleGrain()" class="toggle-btn">Toggle Grain Overlay (Space)</button>
  </div>

  <script>
    let currentFrame = '0001';
    let currentQuality = 78;
    let currentFormat = 'webp';
    let grainActive = true;

    const avifQualityMap = {
      75: 63,
      78: 66,
      82: 70,
      85: 72,
      90: 76
    };

    function updateImage() {
      const img = document.getElementById('testFrame');
      const quality = currentFormat === 'avif' ? avifQualityMap[currentQuality] : currentQuality;
      const suffix = currentFormat === 'avif' ? '-avif' : '';
      img.src = `./test-compression-output/frame-${currentFrame}-q${quality}${suffix}.${currentFormat}`;
      
      // Update info panel
      document.getElementById('infoFrame').textContent = currentFrame;
      document.getElementById('infoFormat').textContent = currentFormat.toUpperCase();
      document.getElementById('infoQuality').textContent = `q${quality}`;
      document.getElementById('infoGrain').textContent = grainActive ? 'ON' : 'OFF';
    }

    function changeFrame(frame) {
      currentFrame = frame;
      updateImage();
      
      // Update active button
      document.querySelectorAll('.frame-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.frame === frame);
      });
    }

    function changeQuality(quality) {
      currentQuality = quality;
      updateImage();
      
      // Update active button
      document.querySelectorAll('.quality-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.quality == quality);
      });
    }

    function changeFormat(format) {
      currentFormat = format;
      updateImage();
      
      // Update active button
      document.querySelectorAll('.format-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.format === format);
      });
    }

    function toggleGrain() {
      grainActive = !grainActive;
      const grain = document.getElementById('grainOverlay');
      grain.classList.toggle('active', grainActive);
      document.getElementById('infoGrain').textContent = grainActive ? 'ON' : 'OFF';
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      const frames = ['0001', '0500', '1000', '1500', '1746'];
      const qualities = [75, 78, 82, 85, 90];
      
      if (e.code === 'Space') {
        e.preventDefault();
        toggleGrain();
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        const currentIdx = qualities.indexOf(currentQuality);
        if (currentIdx > 0) changeQuality(qualities[currentIdx - 1]);
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        const currentIdx = qualities.indexOf(currentQuality);
        if (currentIdx < qualities.length - 1) changeQuality(qualities[currentIdx + 1]);
      } else if (e.code === 'ArrowUp') {
        e.preventDefault();
        const currentIdx = frames.indexOf(currentFrame);
        if (currentIdx > 0) changeFrame(frames[currentIdx - 1]);
      } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        const currentIdx = frames.indexOf(currentFrame);
        if (currentIdx < frames.length - 1) changeFrame(frames[currentIdx + 1]);
      } else if (e.code === 'KeyW') {
        changeFormat('webp');
      } else if (e.code === 'KeyA') {
        changeFormat('avif');
      }
    });

    // Initial load
    updateImage();
  </script>
</body>
</html>
