## Workflow Rules

workflow:
  codingStandards:
    - "TypeScript strict mode required"
    - "No 'any' types"
    - "GSAP animations must clean up (ctx.revert())"
    - "CSS Modules only (no Tailwind)"
    - "Three fonts only: Quicksand, Lato, Roboto Condensed"
    - "Four brand colors only: Ink, Sand, Orange, Blue"

  archetype:
    - "Every important page must balance 'noble' (emotional) + 'rigorous' (proof)"
    - "B2B copy must use 'professionnels' language"
    - "B2C copy must use 'particuliers' language"
    - "Never mix archetypes within a section"

  audience:
    - "B2B and B2C are separate journeys, never merged"
    - "Shared pages accessible from both journeys"
    - "Navigation must make audience mode clear"
    - "CTAs must align to audience (Contact Pro vs Shop)"

  accessibility:
    - "Respect prefers-reduced-motion in all animations"
    - "WCAG 2.1 AA contrast minimum (4.5:1 for text)"
    - "Keyboard-accessible forms and links"
    - "Alt text for all images"

  review:
    - "CEO reviews all brand/strategy decisions"
    - "Design lead reviews all visual decisions"
    - "Frontend dev reviews all code decisions"
    - "Database manager reviews all data decisions"

## Handoff Rules

handoffs:
  # CEO → Design Lead
  - from: ceo
    to: design-lead
    trigger: "Brand direction approved"
    output: "Design mockups, visual specs"

  # Design Lead → Frontend Dev
  - from: design-lead
    to: frontend-dev
    trigger: "Design approved"
    output: "Design specs, component list, animation direction"

  # Content Strategist → Frontend Dev
  - from: content-strategist
    to: frontend-dev
    trigger: "Copy and IA approved"
    output: "Content structure, copy, page intent"

  # Frontend Dev → CEO
  - from: frontend-dev
    to: ceo
    trigger: "Page implementation complete"
    output: "Live page URL, screenshot, notes"

  # DB Manager → Frontend Dev (for data integration)
  - from: db-manager
    to: frontend-dev
    trigger: "Schema designed and approved"
    output: "Schema docs, query examples, TypeScript interfaces"

## Communication

communication:
  dailyStandup:
    time: "09:00 UTC"
    participants: [ceo, frontend-dev, design-lead, content-strategist, db-manager]
    duration: "15 min"
    format: "Slack status: what I shipped, what I'm blocked on"

  weeklyRetro:
    time: "Friday 16:00 UTC"
    participants: [ceo]
