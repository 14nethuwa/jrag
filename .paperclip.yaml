## Sprint Process

sprint:
  phases:
    - name: "Think"
      description: "Brainstorm, reframe problem, challenge assumptions"
      owner: ceo
      skills: [brainstorming, jrag-brand-implementation]

    - name: "Plan"
      description: "CEO review → Design review → Eng review"
      owner: ceo
      skills: [para-memory-files]

    - name: "Build"
      description: "Parallel work: Frontend + Content + Design"
      owner: frontend-dev
      skills: [jrag-page-templates, jrag-animation-patterns]

    - name: "Review"
      description: "Auto-fix, flag gaps, get feedback"
      owner: frontend-dev
      skills: [requesting-code-review]

    - name: "Test"
      description: "QA in real browser, fix regressions"
      owner: frontend-dev
      skills: []

    - name: "Ship"
      description: "Stage, commit, push, open PR"
      owner: frontend-dev
      skills: []

    - name: "Reflect"
      description: "Extract learnings, update org memory"
      owner: ceo
      skills: [para-memory-files]

